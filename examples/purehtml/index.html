<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure HTML Micro App</title>
  <style>
    body {
      margin: 0;
    }

    .purehtml-root {
      font-family: Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #fef3c7 0%, #f8fafc 42%, #fef3c7 100%);
      color: #0f172a;
    }

    .purehtml-root .micro-shell {
      padding: 28px;
      display: grid;
      align-content: start;
      gap: 20px;
    }

    .purehtml-root .card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 40px -32px #1e293b;
    }

    .purehtml-root .hero {
      display: grid;
      gap: 14px;
    }

    .purehtml-root .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .purehtml-root .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #d97706, #b45309);
    }
    .purehtml-root .badge-soft {
      color: #1e293b;
      background: #e2e8f0;
    }

    .purehtml-root .logo-group {
      display: flex;
      gap: 10px;
    }

    .purehtml-root .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      text-decoration: none;
      box-shadow: 0 10px 30px -22px #1e293b;
      transition: transform 0.2s ease;
    }

    .purehtml-root .logo:hover {
      transform: translateY(-1px) scale(1.03);
    }

    .purehtml-root .logo-html {
      background: #fed7aa;
    }

    .purehtml-root .logo-js {
      background: #fef08a;
    }

    .purehtml-root .stats-grid {
      margin: 0 0 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .purehtml-root .stat-item {
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      padding: 12px;
    }

    .purehtml-root .stat-item dt {
      font-size: 12px;
      color: #64748b;
    }

    .purehtml-root .stat-item dd {
      margin: 2px 0 0;
      font-weight: 600;
    }

    .purehtml-root h1 {
      margin: 0;
      font-size: 28px;
    }

    .purehtml-root p {
      margin: 8px 0 0;
      color: #475569;
    }

    .purehtml-root .btn {
      border: 0;
      background: #d97706;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .purehtml-root .hint {
      color: #64748b;
      margin-bottom: 0;
    }

    .purehtml-root .app-section-title {
      margin: 0 0 10px;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    .purehtml-root button {
      border: 0;
      background: #d97706;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="purehtml-root">
    <div class="micro-shell">
    <header class="card hero">
      <div class="badge-row">
        <span class="badge">Vanilla JS</span>
        <span class="badge badge-soft" id="purehtml-qiankun-version">qiankun N/A</span>
        <span class="badge badge-soft" id="purehtml-runtime">standalone</span>
      </div>

      <div class="logo-group">
        <a class="logo logo-html" href="https://developer.mozilla.org/en-US/docs/Web/HTML" target="_blank" rel="noreferrer">🧩</a>
        <a class="logo logo-js" href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank" rel="noreferrer">⚡</a>
      </div>

      <h1>Pure HTML Micro App</h1>
      <p>与 React / Vue / Vite 子应用统一的视觉风格与信息层级</p>
    </header>
    <section id="purehtml-container" class="card"></section>
    </div>
  </div>
  <script src="//localhost:7102/entry.js" entry></script>
</body>
</html>
